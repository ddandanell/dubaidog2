kind = "web"
previewPath = "/"
title = "PawClearance — Dubai Pet Relocation"
version = "1.0.0"
id = "artifacts/pawclearance"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18137

[services.development]
run = "pnpm --filter @workspace/pawclearance run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pawclearance", "run", "build" ]
publicDir = "artifacts/pawclearance/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18137"
BASE_PATH = "/"
